name: "LikX: CI"

on:
  push:
    branches: [main]
    paths:
      - 'likx/**'
      - '.github/workflows/likx-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'likx/**'
      - '.github/workflows/likx-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: likx

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Lint
        run: ruff check src/ main.py

      - name: Check formatting
        run: ruff format --check src/ main.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            libcairo2-dev \
            pkg-config \
            python3-dev \
            gir1.2-gtk-3.0 \
            gir1.2-gdk-3.0 \
            gir1.2-gdkpixbuf-2.0 \
            gir1.2-pango-1.0 \
            libgtk-3-dev \
            xvfb

      - name: Install test dependencies
        run: pip install pytest pytest-cov pytest-timeout "PyGObject<3.50" pycairo

      - name: Run tests
        run: xvfb-run -a pytest tests/ -v --cov=src --cov-report=term-missing --cov-fail-under=40

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: likx/coverage.xml
          fail_ci_if_error: false
